---
# ConfigMap for PostgreSQL configuration and init scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: {{NAMESPACE}}
  labels:
    app: postgresql
    app.kubernetes.io/part-of: postgresql
    app.kubernetes.io/managed-by: postgres-k8s-setup
data:
  # Custom postgresql.conf overrides (appended to default config)
  custom-postgresql.conf: |
    # Connections
    max_connections = 100
    # Memory
    shared_buffers = 128MB
    effective_cache_size = 256MB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    # WAL
    wal_buffers = 4MB
    min_wal_size = 80MB
    max_wal_size = 1GB
    # Checkpoints
    checkpoint_completion_target = 0.9
    # Logging
    log_timezone = 'UTC'
    log_statement = 'none'
    log_min_duration_statement = 1000
    # Locale
    datestyle = 'iso, mdy'
    timezone = 'UTC'
    lc_messages = 'en_US.utf8'
    lc_monetary = 'en_US.utf8'
    lc_numeric = 'en_US.utf8'
    lc_time = 'en_US.utf8'
    default_text_search_config = 'pg_catalog.english'

  # Init script to create the application database
  init-db.sh: |
    #!/bin/bash
    set -e
    echo "Creating database '$POSTGRES_DB' if it does not exist..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "postgres" <<-EOSQL
      SELECT 'CREATE DATABASE ${POSTGRES_DB}'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${POSTGRES_DB}')
      \gexec
    EOSQL
    echo "Database initialization complete."

---
# Headless Service for StatefulSet DNS (pod-level addressing)
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: {{NAMESPACE}}
  labels:
    app: postgresql
    app.kubernetes.io/part-of: postgresql
    app.kubernetes.io/managed-by: postgres-k8s-setup
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# ClusterIP Service for load-balanced access
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{NAMESPACE}}
  labels:
    app: postgresql
    app.kubernetes.io/part-of: postgresql
    app.kubernetes.io/managed-by: postgres-k8s-setup
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# StatefulSet for PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{NAMESPACE}}
  labels:
    app: postgresql
    app.kubernetes.io/part-of: postgresql
    app.kubernetes.io/managed-by: postgres-k8s-setup
spec:
  serviceName: postgres-headless
  replicas: {{REPLICAS}}
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        app.kubernetes.io/part-of: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/custom
              readOnly: true
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: postgres-config
            items:
              - key: custom-postgresql.conf
                path: postgresql.conf
        - name: init-scripts
          configMap:
            name: postgres-config
            items:
              - key: init-db.sh
                path: init-db.sh
                mode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: postgresql
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: postgres-storage
        resources:
          requests:
            storage: {{STORAGE}}
