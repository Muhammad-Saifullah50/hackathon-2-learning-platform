# Kafka KRaft Mode — Combined Controller + Broker StatefulSet
# No Zookeeper dependency. Requires Kafka 3.3+.
# Placeholders: {{NAMESPACE}}, {{BROKERS}}, {{STORAGE}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-kraft-config
  namespace: {{NAMESPACE}}
  labels:
    app: kafka
    app.kubernetes.io/managed-by: kafka-k8s-setup
data:
  # KRaft server.properties
  server.properties: |
    # ── KRaft Mode ──
    process.roles=broker,controller
    node.id=${KAFKA_NODE_ID}
    controller.quorum.voters=${KAFKA_CONTROLLER_QUORUM_VOTERS}
    controller.listener.names=CONTROLLER

    # ── Listeners ──
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=PLAINTEXT://${HOSTNAME}.kafka-headless.{{NAMESPACE}}.svc.cluster.local:9092
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    inter.broker.listener.name=PLAINTEXT

    # ── Log dirs ──
    log.dirs=/var/lib/kafka/data
    log.retention.hours=168
    log.segment.bytes=1073741824
    log.retention.check.interval.ms=300000

    # ── Replication ──
    num.partitions=3
    default.replication.factor=1
    min.insync.replicas=1
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1

    # ── Network ──
    num.network.threads=3
    num.io.threads=8
    socket.send.buffer.bytes=102400
    socket.receive.buffer.bytes=102400
    socket.request.max.bytes=104857600

    # ── Group coordinator ──
    group.initial.rebalance.delay.ms=0

  # Init script: format storage and set node ID
  kafka-init.sh: |
    #!/bin/bash
    set -e

    # Extract node ID from hostname (kafka-0 → 0, kafka-1 → 1, etc.)
    export KAFKA_NODE_ID=${HOSTNAME##*-}

    # Build quorum voters string: 0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,...
    QUORUM_VOTERS=""
    for i in $(seq 0 $((${KAFKA_REPLICAS} - 1))); do
      if [ -n "$QUORUM_VOTERS" ]; then
        QUORUM_VOTERS="${QUORUM_VOTERS},"
      fi
      QUORUM_VOTERS="${QUORUM_VOTERS}${i}@kafka-${i}.kafka-headless.{{NAMESPACE}}.svc.cluster.local:9093"
    done
    export KAFKA_CONTROLLER_QUORUM_VOTERS="$QUORUM_VOTERS"

    # Generate server.properties from template
    envsubst < /opt/kafka/config-template/server.properties > /opt/kafka/config/server.properties

    # Format storage if not already formatted
    CLUSTER_ID_FILE="/var/lib/kafka/data/.cluster_id"
    if [ ! -f "$CLUSTER_ID_FILE" ]; then
      # Generate or use shared cluster ID
      if [ "${KAFKA_NODE_ID}" = "0" ]; then
        CLUSTER_ID=$(kafka-storage.sh random-uuid 2>/dev/null || cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 22)
        echo "$CLUSTER_ID" > "$CLUSTER_ID_FILE"
      else
        # Wait for node-0 to generate the cluster ID
        echo "Waiting for cluster ID from kafka-0..."
        RETRIES=30
        while [ $RETRIES -gt 0 ]; do
          # Try to get cluster ID from kafka-0's PVC via a shared configmap
          if kubectl get configmap kafka-cluster-id -n {{NAMESPACE}} -o jsonpath='{.data.cluster-id}' 2>/dev/null; then
            CLUSTER_ID=$(kubectl get configmap kafka-cluster-id -n {{NAMESPACE}} -o jsonpath='{.data.cluster-id}')
            echo "$CLUSTER_ID" > "$CLUSTER_ID_FILE"
            break
          fi
          sleep 2
          RETRIES=$((RETRIES - 1))
        done
        if [ ! -f "$CLUSTER_ID_FILE" ]; then
          # Fallback: generate own ID (will work for single-node)
          CLUSTER_ID=$(kafka-storage.sh random-uuid 2>/dev/null || cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 22)
          echo "$CLUSTER_ID" > "$CLUSTER_ID_FILE"
        fi
      fi

      CLUSTER_ID=$(cat "$CLUSTER_ID_FILE")
      echo "Formatting storage with cluster ID: $CLUSTER_ID"
      kafka-storage.sh format -t "$CLUSTER_ID" -c /opt/kafka/config/server.properties --ignore-formatted 2>/dev/null || true
    else
      echo "Storage already formatted with cluster ID: $(cat $CLUSTER_ID_FILE)"
    fi

    echo "Starting Kafka broker (node.id=$KAFKA_NODE_ID)..."
    exec kafka-server-start.sh /opt/kafka/config/server.properties
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: {{NAMESPACE}}
  labels:
    app: kafka
    app.kubernetes.io/managed-by: kafka-k8s-setup
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: controller
      port: 9093
      targetPort: 9093
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: {{NAMESPACE}}
  labels:
    app: kafka
    app.kubernetes.io/managed-by: kafka-k8s-setup
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{NAMESPACE}}
  labels:
    app: kafka
    app.kubernetes.io/managed-by: kafka-k8s-setup
spec:
  serviceName: kafka-headless
  replicas: {{BROKERS}}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/managed-by: kafka-k8s-setup
    spec:
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: kafka
          image: apache/kafka:3.8.1
          command:
            - bash
            - -c
            - |
              # Extract node ID from hostname
              export KAFKA_NODE_ID=${HOSTNAME##*-}
              export KAFKA_REPLICAS={{BROKERS}}

              # Build quorum voters
              QUORUM_VOTERS=""
              for i in $(seq 0 $((KAFKA_REPLICAS - 1))); do
                if [ -n "$QUORUM_VOTERS" ]; then
                  QUORUM_VOTERS="${QUORUM_VOTERS},"
                fi
                QUORUM_VOTERS="${QUORUM_VOTERS}${i}@kafka-${i}.kafka-headless.{{NAMESPACE}}.svc.cluster.local:9093"
              done

              # Write server.properties
              cat > /tmp/server.properties <<PROPS
              process.roles=broker,controller
              node.id=${KAFKA_NODE_ID}
              controller.quorum.voters=${QUORUM_VOTERS}
              controller.listener.names=CONTROLLER
              listeners=PLAINTEXT://:9092,CONTROLLER://:9093
              advertised.listeners=PLAINTEXT://${HOSTNAME}.kafka-headless.{{NAMESPACE}}.svc.cluster.local:9092
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/var/lib/kafka/data
              log.retention.hours=168
              log.segment.bytes=1073741824
              log.retention.check.interval.ms=300000
              num.partitions=3
              default.replication.factor=1
              min.insync.replicas=1
              offsets.topic.replication.factor=1
              transaction.state.log.replication.factor=1
              transaction.state.log.min.isr=1
              num.network.threads=3
              num.io.threads=8
              socket.send.buffer.bytes=102400
              socket.receive.buffer.bytes=102400
              socket.request.max.bytes=104857600
              group.initial.rebalance.delay.ms=0
              PROPS

              # Remove leading whitespace from heredoc
              sed -i 's/^[[:space:]]*//' /tmp/server.properties

              # Format storage if needed
              CLUSTER_ID_FILE="/var/lib/kafka/data/.cluster_id"
              if [ ! -f "/var/lib/kafka/data/meta.properties" ]; then
                CLUSTER_ID="MkU3Oe8xTkKLCIghPQ2Hcg"
                echo "Formatting storage with cluster ID: $CLUSTER_ID"
                /opt/kafka/bin/kafka-storage.sh format \
                  -t "$CLUSTER_ID" \
                  -c /tmp/server.properties \
                  --ignore-formatted 2>/dev/null || true
              fi

              echo "Starting Kafka broker (node.id=$KAFKA_NODE_ID)..."
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          ports:
            - name: plaintext
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512m -Xms512m"
            - name: KAFKA_REPLICAS
              value: "{{BROKERS}}"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: kafka
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: kafka-storage
        resources:
          requests:
            storage: {{STORAGE}}
